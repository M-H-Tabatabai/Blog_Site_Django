{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="theme-color" content="#33b5e5">
    <title>signup</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://mdbcdn.b-cdn.net/wp-content/themes/mdbootstrap4/docs-app/css/dist/mdb5/standard/core.min.css">
    <link rel='stylesheet' id='roboto-subset.css-css'  href='https://mdbcdn.b-cdn.net/wp-content/themes/mdbootstrap4/docs-app/css/mdb5/fonts/roboto-subset.css?ver=3.9.0-update.5' type='text/css' media='all' />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/8.2.0/mdb.umd.min.js"></script>
</head>
<body>
    <section class="w-100 px-4 py-5 gradient-custom" style="border-radius: .5rem .5rem 0 0;">
      <style>
        .gradient-custom {
          /* fallback for old browsers */
          background: #6a11cb;

          /* Chrome 10-25, Safari 5.1-6 */
          background: -webkit-linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1));

          /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
          background: linear-gradient(to right, rgba(106, 17, 203, 1), rgba(37, 117, 252, 1))
        }
      </style>
      <div class="row d-flex justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-6">
          <div class="card bg-dark text-white" style="border-radius: 1rem;">
            <div class="card-body p-5 text-center">

                {% if error %}
                <div class="alert alert-danger mb-4">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="form-outline form-white mb-4">
                        <label for="username" style="display:block; text-align:left; color:white; margin-bottom:8px;">
                            Username
                        </label>
                        <input
                            style="width:100%; background:transparent; color:white; border:1px solid white; border-radius:5px; padding:10px;"   
                            type="text"
                            id="username"
                            name="username"
                            class="form-control form-control-lg"
                            required
                        />
                    </div>

                    <div class="form-outline form-white mb-4">
                        <label for="password" style="display:block; text-align:left; color:white; margin-bottom:8px;">
                            Password
                        </label>
                        <input
                            style="width:100%; background:transparent; color:white; border:1px solid white; border-radius:5px; padding:10px;"
                            type="password"
                            name="password1"
                            class="form-control form-control-lg"
                            required
                        />
                    </div>
                    <div class="form-outline form-white mb-4">
                        <label for="password" style="display:block; text-align:left; color:white; margin-bottom:8px;">
                            confirm password
                        </label>
                        <input
                            style="width:100%; background:transparent; color:white; border:1px solid white; border-radius:5px; padding:10px;"
                            type="password"
                            name="password2"
                            class="form-control form-control-lg"
                            required
                        />
                    </div>

                    <p class="small mb-5 pb-lg-2">
                        <a class="text-white-50" href="#!">Forgot password?</a>
                    </p>
                    <div class="mb-4 text-start text-white">
                        {{ form.captcha.label_tag }}
                        {{ form.captcha }}
                        
                        {% if form.captcha.errors %}
                            <div class="text-danger mt-2">
                                {{ form.captcha.errors }}
                            </div>
                        {% endif %}
                    </div>
                    <button
                        class="btn btn-outline-light btn-lg px-5"
                        type="submit"
                    >
                        SignUp
                    </button>
                </form>

              <div>
                <p class="mb-0">Don't have an account? <a href="#!" class="text-white-50 fw-bold">Sign Up</a></p>
              </div>

            </div>
          </div>
        </div>
      </div>
    </section>
</body>
</html>
